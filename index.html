<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="资产追踪">
    <link rel="manifest" href="/asset-tracker/manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23667eea' width='100' height='100' rx='20'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>💰</text></svg>">
    <title>个人资产追踪 Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f7; color: #1d1d1f; min-height: 100vh; padding-bottom: 100px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 0 0 20px 20px; }
        .header h1 { font-size: 20px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .stat-card { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: 12px; padding: 12px; }
        .stat-card .label { font-size: 12px; opacity: 0.9; }
        .stat-card .value { font-size: 24px; font-weight: 700; margin-top: 4px; }
        .stat-card.profit .value { color: #4ade80; }
        .stat-card.profit.loss .value { color: #f87171; }
        .content { padding: 20px; max-width: 600px; margin: 0 auto; }
        .tabs { display: flex; background: white; border-radius: 12px; padding: 4px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow-x: auto; }
        .tab { flex: 1; padding: 10px 8px; text-align: center; font-size: 13px; cursor: pointer; border-radius: 8px; transition: all 0.2s; white-space: nowrap; }
        .tab.active { background: #667eea; color: white; }
        .search-bar { display: flex; gap: 8px; margin-bottom: 12px; }
        .search-bar input { flex: 1; padding: 10px 12px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 14px; outline: none; }
        .search-bar input:focus { border-color: #667eea; }
        .search-bar select { padding: 10px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 13px; background: white; }
        .batch-bar { display: none; background: #fef3c7; padding: 10px 12px; border-radius: 10px; margin-bottom: 12px; align-items: center; justify-content: space-between; }
        .batch-bar.active { display: flex; }
        .batch-bar span { font-size: 13px; }
        .batch-actions { display: flex; gap: 8px; }
        .batch-btn { padding: 6px 12px; border-radius: 6px; font-size: 12px; border: none; cursor: pointer; }
        .batch-btn.sell { background: #667eea; color: white; }
        .batch-btn.idle { background: #fef3c7; color: #d97706; }
        .batch-btn.delete { background: #fee2e2; color: #dc2626; }
        .section-title { font-size: 16px; font-weight: 600; margin: 20px 0 12px; display: flex; align-items: center; gap: 8px; }
        .asset-list { display: flex; flex-direction: column; gap: 12px; }
        .asset-card { background: white; border-radius: 16px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .asset-card.selected { border: 2px solid #667eea; }
        .asset-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; }
        .asset-name { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .asset-status { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 500; }
        .status-active { background: #dcfce7; color: #16a34a; }
        .status-idle { background: #fef3c7; color: #d97706; }
        .status-sold { background: #e0e7ff; color: #4f46e5; }
        .status-expired { background: #fee2e2; color: #dc2626; }
        .asset-price { font-size: 24px; font-weight: 700; color: #667eea; }
        .asset-meta { display: flex; gap: 16px; margin-top: 8px; font-size: 12px; color: #86868b; flex-wrap: wrap; }
        .asset-cost { margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0f0f5; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; font-size: 13px; }
        .cost-item .cost-label { color: #86868b; font-size: 11px; }
        .cost-item .cost-value { font-weight: 600; margin-top: 2px; }
        .profit { color: #16a34a; }
        .loss { color: #dc2626; }
        .asset-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .btn { padding: 8px 12px; border-radius: 8px; font-size: 12px; border: none; cursor: pointer; transition: all 0.2s; }
        .btn-sell { background: #667eea; color: white; }
        .btn-idle { background: #fef3c7; color: #d97706; }
        .btn-active { background: #dcfce7; color: #16a34a; }
        .btn-edit { background: #f0f0f5; color: #666; }
        .btn-delete { background: #fee2e2; color: #dc2626; }
        .btn-expire { background: #fee2e2; color: #dc2626; }
        .fab { position: fixed; bottom: 30px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-size: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); cursor: pointer; border: none; z-index: 100; }
        .sync-bar { position: fixed; top: 10px; right: 10px; display: flex; gap: 8px; z-index: 100; }
        .sync-btn { padding: 8px 12px; background: white; border: none; border-radius: 8px; font-size: 12px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .sync-status { padding: 8px 12px; background: white; border-radius: 8px; font-size: 11px; color: #86868b; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 20px; padding: 24px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h2 { font-size: 18px; }
        .modal-close { width: 32px; height: 32px; border-radius: 50%; background: #f0f0f5; border: none; font-size: 18px; cursor: pointer; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: #86868b; margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 15px; outline: none; }
        .form-group input:focus, .form-group select:focus { border-color: #667eea; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-submit { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .empty-state { text-align: center; padding: 60px 20px; color: #86868b; }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .file-input { display: none; }
        .quick-stats { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .quick-stats h3 { font-size: 14px; color: #86868b; margin-bottom: 12px; }
        .quick-stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; text-align: center; }
        .quick-stat-item .qs-value { font-size: 18px; font-weight: 700; color: #667eea; }
        .quick-stat-item .qs-label { font-size: 11px; color: #86868b; margin-top: 2px; }
        .expire-warning { background: #fef3c7; border-left: 3px solid #f59e0b; padding: 8px 12px; margin-top: 8px; font-size: 12px; border-radius: 0 8px 8px 0; }
        .tag { display: inline-block; background: #e0e7ff; color: #4f46e5; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-right: 4px; }
        .checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: #667eea; }
        
        /* 分析页面样式 */
        .analysis-section { background: white; border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .analysis-section h3 { font-size: 15px; margin-bottom: 12px; color: #1d1d1f; }
        .analysis-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .analysis-item { padding: 12px; background: #f9fafb; border-radius: 10px; }
        .analysis-item .ai-label { display: block; font-size: 11px; color: #86868b; margin-bottom: 4px; }
        .analysis-item .ai-value { font-size: 18px; font-weight: 700; color: #1d1d1f; }
        .analysis-item.profit .ai-value { color: #16a34a; }
        .analysis-item.loss .ai-value { color: #dc2626; }
        .category-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f5; }
        .category-row:last-child { border-bottom: none; }
        .cat-name { font-weight: 500; }
        .cat-stats { display: flex; gap: 12px; font-size: 13px; color: #86868b; }
        .cat-stats .profit { color: #16a34a; }
        .cat-stats .loss { color: #dc2626; }
        .month-row { position: relative; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .month-name { font-weight: 500; z-index: 1; }
        .month-stats { display: flex; gap: 12px; font-size: 13px; color: #86868b; z-index: 1; }
        .month-bar { position: absolute; left: 0; top: 0; bottom: 0; background: linear-gradient(90deg, rgba(102,126,234,0.15) 0%, rgba(118,75,162,0.08) 100%); border-radius: 8px; z-index: 0; }
        .suggestions { display: flex; flex-direction: column; gap: 8px; }
        .suggestion { padding: 12px; background: #f9fafb; border-radius: 10px; font-size: 13px; line-height: 1.5; }
        
        /* 图表样式 */
        .chart-container { margin: 16px 0; }
        .pie-chart { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; padding: 16px 0; }
        .pie-legend { display: flex; flex-direction: column; gap: 8px; min-width: 150px; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .legend-color { width: 12px; height: 12px; border-radius: 3px; }
        .bar-chart { padding: 16px 0; }
        .bar-item { margin-bottom: 12px; }
        .bar-label { font-size: 12px; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .bar-track { height: 24px; background: #f0f0f5; border-radius: 6px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 6px; transition: width 0.3s; }
        
        /* 折旧卡片 */
        .depreciation-card { background: white; border-radius: 12px; padding: 12px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .depreciation-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .depreciation-name { font-weight: 600; }
        .depreciation-original { font-size: 12px; color: #86868b; text-decoration: line-through; }
        .depreciation-current { font-size: 18px; font-weight: 700; color: #667eea; }
        .depreciation-bar { height: 6px; background: #f0f0f5; border-radius: 3px; margin-top: 8px; }
        .depreciation-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 3px; }
        
        /* 导出选项 */
        .export-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .export-btn { padding: 12px; background: #f9fafb; border: 1px solid #e0e0e0; border-radius: 10px; text-align: center; cursor: pointer; font-size: 13px; }
        .export-btn:hover { background: #f0f0f5; }
    </style>
</head>
<body>
    <div class="sync-bar">
        <div class="sync-status" id="sync-status">🔄 加载中...</div>
        <button class="sync-btn" onclick="openSettingsModal()">⚙️</button>
        <button class="sync-btn" onclick="showExportModal()">📤</button>
        <button class="sync-btn" onclick="document.getElementById('import-file').click()">📥</button>
        <input type="file" id="import-file" class="file-input" accept=".json" onchange="importData(event)">
    </div>
    
    <div class="header">
        <h1>💰 个人资产追踪 Pro</h1>
        <div class="stats">
            <div class="stat-card"><div class="label">总资产</div><div class="value" id="total-value">¥0</div></div>
            <div class="stat-card"><div class="label">物品数量</div><div class="value" id="total-count">0</div></div>
            <div class="stat-card"><div class="label">闲置中</div><div class="value" id="idle-count">0</div></div>
            <div class="stat-card profit" id="profit-card"><div class="label">已卖出盈亏</div><div class="value" id="total-profit">¥0</div></div>
        </div>
    </div>
    
    <div class="content">
        <!-- 快速统计 -->
        <div class="quick-stats">
            <h3>📊 快速分析</h3>
            <div class="quick-stats-grid">
                <div class="quick-stat-item"><div class="qs-value" id="avg-daily-cost">¥0</div><div class="qs-label">平均日均成本</div></div>
                <div class="quick-stat-item"><div class="qs-value" id="expire-count">0</div><div class="qs-label">即将过期</div></div>
                <div class="quick-stat-item"><div class="qs-value" id="high-value-count">0</div><div class="qs-label">高价值物品</div></div>
            </div>
        </div>
        
        <!-- 搜索筛选 -->
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="🔍 搜索名称/标签..." oninput="handleSearch()">
            <select id="filter-category" onchange="handleSearch()">
                <option value="">全部分类</option>
                <option value="数码">📱 数码</option>
                <option value="电脑">💻 电脑</option>
                <option value="家电">🎮 家电</option>
                <option value="奢侈品">👜 奢侈品</option>
                <option value="收藏">🎨 收藏</option>
                <option value="日用品">🧴 日用品</option>
                <option value="食品">🍎 食品</option>
                <option value="金融">📈 金融</option>
                <option value="其他">📦 其他</option>
            </select>
        </div>
        
        <!-- 批量操作栏 -->
        <div class="batch-bar" id="batch-bar">
            <span id="selected-count">已选 0 件</span>
            <div class="batch-actions">
                <button class="batch-btn sell" onclick="batchSetStatus('sold')">卖出</button>
                <button class="batch-btn idle" onclick="batchSetStatus('idle')">闲置</button>
                <button class="batch-btn idle" onclick="batchSetStatus('active')">使用中</button>
                <button class="batch-btn delete" onclick="batchDelete()">删除</button>
            </div>
        </div>
        
        <div class="tabs">
            <div class="tab active" data-filter="all">全部</div>
            <div class="tab" data-filter="active">使用中</div>
            <div class="tab" data-filter="idle">闲置</div>
            <div class="tab" data-filter="sold">已卖出</div>
            <div class="tab" data-filter="expiring">即将过期</div>
            <div class="tab" data-filter="analysis">📊 分析</div>
        </div>
        
        <div class="asset-list" id="asset-list"><div class="empty-state"><div class="icon">📦</div>加载中...</div></div>
    </div>
    
    <button class="fab" id="add-btn">+</button>
    
    <!-- 设置弹窗 -->
    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚙️ 同步设置</h2>
                <button class="modal-close" onclick="document.getElementById('settings-modal').classList.remove('active')">×</button>
            </div>
            <div class="form-group">
                <label>GitHub Token（必填）</label>
                <input type="password" id="settings-token" placeholder="ghp_xxxx...">
            </div>
            <div class="form-group">
                <label>Gist ID（多设备同步用，留空自动创建）</label>
                <input type="text" id="settings-gist-id" placeholder="留空自动创建新Gist">
            </div>
            <button class="btn-submit" onclick="saveSettings()">保存并刷新数据</button>
            <div style="margin-top:15px;font-size:12px;color:#86868b">
                <strong>当前 Gist ID:</strong> <span id="current-gist-id">-</span><br>
                <strong>同步状态:</strong> <span id="current-status">-</span>
            </div>
        </div>
    </div>
    
    <!-- 导出弹窗 -->
    <div class="modal" id="export-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📤 导出数据</h2>
                <button class="modal-close" onclick="document.getElementById('export-modal').classList.remove('active')">×</button>
            </div>
            <div class="export-options">
                <div class="export-btn" onclick="exportData('json')">
                    <div style="font-size:24px;margin-bottom:4px;">📄</div>
                    <div>JSON 格式</div>
                    <div style="font-size:11px;color:#86868b">完整数据备份</div>
                </div>
                <div class="export-btn" onclick="exportData('csv')">
                    <div style="font-size:24px;margin-bottom:4px;">📊</div>
                    <div>CSV 格式</div>
                    <div style="font-size:11px;color:#86868b">Excel 可打开</div>
                </div>
                <div class="export-btn" onclick="exportData('report')">
                    <div style="font-size:24px;margin-bottom:4px;">📝</div>
                    <div>资产报告</div>
                    <div style="font-size:11px;color:#86868b">详细报表</div>
                </div>
                <div class="export-btn" onclick="exportData('summary')">
                    <div style="font-size:24px;margin-bottom:4px;">📋</div>
                    <div>汇总导出</div>
                    <div style="font-size:11px;color:#86868b">分类汇总</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 添加资产弹窗 -->
    <div class="modal" id="add-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">添加资产</h2>
                <button class="modal-close" id="close-modal">×</button>
            </div>
            <form id="asset-form">
                <input type="hidden" id="asset-id">
                <div class="form-group"><label>物品名称 *</label><input type="text" id="asset-name" placeholder="例如：iPhone 15 Pro" required></div>
                <div class="form-row">
                    <div class="form-group"><label>购买价格(元) *</label><input type="number" id="asset-price" placeholder="8999" required min="0"></div>
                    <div class="form-group"><label>购买日期</label><input type="date" id="asset-date"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>分类</label>
                        <select id="asset-category">
                            <option value="数码">📱 数码</option>
                            <option value="电脑">💻 电脑</option>
                            <option value="家电">🎮 家电</option>
                            <option value="奢侈品">👜 奢侈品</option>
                            <option value="收藏">🎨 收藏</option>
                            <option value="日用品">🧴 日用品</option>
                            <option value="食品">🍎 食品/保健品</option>
                            <option value="金融">📈 金融资产</option>
                            <option value="其他">📦 其他</option>
                        </select>
                    </div>
                    <div class="form-group"><label>状态</label>
                        <select id="asset-status">
                            <option value="active">使用中</option>
                            <option value="idle">闲置</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>过期日期</label><input type="date" id="asset-expire"></div>
                    <div class="form-group"><label>数量</label><input type="number" id="asset-quantity" value="1" min="1"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>存放位置</label><input type="text" id="asset-location" placeholder="例如：卧室柜子"></div>
                    <div class="form-group"><label>保修截止</label><input type="date" id="asset-warranty"></div>
                </div>
                <div class="form-group"><label>标签（逗号分隔）</label><input type="text" id="asset-tags" placeholder="例如：自用,送礼,投资"></div>
                <div class="form-group"><label>备注</label><textarea id="asset-note" rows="2" placeholder="可选备注信息"></textarea></div>
                <button type="submit" class="btn-submit">保存</button>
            </form>
        </div>
    </div>
    
    <!-- 卖出弹窗 -->
    <div class="modal" id="sell-modal">
        <div class="modal-content">
            <div class="modal-header"><h2>卖出资产</h2><button class="modal-close" id="close-sell-modal">×</button></div>
            <form id="sell-form">
                <input type="hidden" id="sell-asset-id">
                <div class="form-group"><label>卖出价格(元)</label><input type="number" id="sell-price" placeholder="输入卖出价格" required min="0"></div>
                <div class="form-group"><label>卖出日期</label><input type="date" id="sell-date"></div>
                <div class="form-group"><label>买家（可选）</label><input type="text" id="sell-buyer" placeholder="闲鱼/朋友/其他"></div>
                <button type="submit" class="btn-submit">确认卖出</button>
            </form>
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        const GIST_ID_KEY = 'asset_tracker_gist_id';
        const TOKEN_KEY = 'asset_tracker_token';
        const LOCAL_KEY = 'asset_tracker_data';
        
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');
        const urlGist = urlParams.get('gist');
        
        if (urlToken) localStorage.setItem(TOKEN_KEY, urlToken);
        if (urlGist) localStorage.setItem(GIST_ID_KEY, urlGist);
        
        let githubToken = localStorage.getItem(TOKEN_KEY) || '';
        let gistId = localStorage.getItem(GIST_ID_KEY) || '';
        let allAssets = [];
        let currentFilter = 'all';
        let isSyncing = false;
        let selectedIds = new Set();
        let searchKeyword = '';
        let searchCategory = '';
        
        // ========== 状态更新 ==========
        function updateSyncStatus(status) {
            const el = document.getElementById('sync-status');
            const statusEl = document.getElementById('current-status');
            if (status === 'syncing') { el.textContent = '🔄 同步中...'; if(statusEl) statusEl.textContent = '同步中'; }
            else if (status === 'synced') { el.textContent = '☁️ 已同步'; if(statusEl) statusEl.textContent = '已同步'; }
            else if (status === 'error') { el.textContent = '⚠️ 同步失败'; if(statusEl) statusEl.textContent = '同步失败'; }
            else if (status === 'offline') { el.textContent = '📱 本地模式'; if(statusEl) statusEl.textContent = '本地模式'; }
            else if (status === 'loading') { el.textContent = '🔄 加载中...'; if(statusEl) statusEl.textContent = '加载中'; }
        }
        
        // ========== 核心同步逻辑 ==========
        async function loadData() {
            updateSyncStatus('loading');
            try {
                const res = await fetch(`https://api.github.com/gists/${gistId}?t=${Date.now()}`, {
                    headers: { 'Authorization': `token ${githubToken}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data.files && data.files['assets.json']) {
                        allAssets = JSON.parse(data.files['assets.json'].content);
                        localStorage.setItem(LOCAL_KEY, JSON.stringify(allAssets));
                        updateSyncStatus('synced');
                        renderAssets();
                        updateStats();
                        return;
                    }
                }
            } catch(e) { console.error('Cloud load failed:', e); }
            
            const localData = localStorage.getItem(LOCAL_KEY);
            if (localData) { try { allAssets = JSON.parse(localData); } catch(e2) { allAssets = []; } }
            updateSyncStatus('error');
            renderAssets();
            updateStats();
        }
        
        async function saveData() {
            localStorage.setItem(LOCAL_KEY, JSON.stringify(allAssets));
            if (githubToken && gistId) {
                if (isSyncing) return;
                isSyncing = true;
                updateSyncStatus('syncing');
                try {
                    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
                        method: 'PATCH',
                        headers: { 'Authorization': `token ${githubToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ files: { 'assets.json': { content: JSON.stringify(allAssets, null, 2) } } })
                    });
                    if (res.ok) updateSyncStatus('synced');
                    else throw new Error('Save failed');
                } catch(e) { console.error('Save to gist failed:', e); updateSyncStatus('error'); }
                isSyncing = false;
            } else { updateSyncStatus('offline'); }
        }
        
        // ========== 设置 ==========
        function openSettingsModal() {
            document.getElementById('settings-token').value = githubToken;
            document.getElementById('settings-gist-id').value = gistId;
            updateSettingsDisplay();
            document.getElementById('settings-modal').classList.add('active');
        }
        
        function updateSettingsDisplay() {
            const gistIdEl = document.getElementById('current-gist-id');
            const statusEl = document.getElementById('current-status');
            if (gistIdEl) gistIdEl.textContent = gistId || '未设置';
            if (statusEl) statusEl.textContent = githubToken ? (gistId ? '已同步' : '本地模式') : '本地模式';
        }
        
        async function saveSettings() {
            const newToken = document.getElementById('settings-token').value.trim();
            const newGistId = document.getElementById('settings-gist-id').value.trim();
            if (newToken) { githubToken = newToken; localStorage.setItem(TOKEN_KEY, newToken); }
            if (newGistId) { gistId = newGistId; localStorage.setItem(GIST_ID_KEY, newGistId); }
            document.getElementById('settings-modal').classList.remove('active');
            await loadData();
        }
        
        // ========== 导出 ==========
        function showExportModal() {
            document.getElementById('export-modal').classList.add('active');
        }
        
        function exportData(type) {
            if (type === 'json') {
                const data = JSON.stringify(allAssets, null, 2);
                downloadFile(data, `个人资产_${new Date().toISOString().split('T')[0]}.json`, 'application/json');
            } else if (type === 'csv') {
                const headers = ['名称', '分类', '状态', '购买价格', '购买日期', '数量', '日均成本', '存放位置', '保修截止', '过期日期', '标签', '备注', '卖出价格', '卖出日期', '买家'];
                const rows = allAssets.map(a => {
                    const today = new Date();
                    const buyDate = a.date || a.created_at?.split('T')[0];
                    const days = buyDate ? Math.max(1, Math.floor((today - new Date(buyDate)) / 86400000)) : 1;
                    const dailyCost = days > 0 ? (a.price || 0) / days : 0;
                    return [
                        a.name, a.category, a.status, a.price, buyDate, a.quantity || 1,
                        dailyCost.toFixed(2), a.location || '', a.warranty_date || '',
                        a.expire_date || '', a.tags || '', a.note || '',
                        a.sell_price || '', a.sell_date || '', a.sell_buyer || ''
                    ].map(v => `"${v}"`).join(',');
                });
                const csv = [headers.join(','), ...rows].join('\n');
                downloadFile(csv, `个人资产_${new Date().toISOString().split('T')[0]}.csv`, 'text/csv');
            } else if (type === 'report') {
                const today = new Date();
                let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>资产报告</title>`;
                html += `<style>body{font-family:-apple-system,sans-serif;padding:20px;max-width:800px;margin:0 auto}table{width:100%;border-collapse:collapse;margin:16px 0}th,td{border:1px solid #ddd;padding:8px;text-align:left}th{background:#667eea;color:white}tr:nth-child(even){background:#f9f9f9}.profit{color:#16a34a}.loss{color:#dc2626}</style>`;
                html += `</head><body><h1>📊 个人资产报告</h1><p>生成时间：${today.toLocaleString('zh-CN')}</p>`;
                
                // 汇总
                let totalValue = 0, totalProfit = 0, activeCount = 0, idleCount = 0;
                allAssets.forEach(a => {
                    if (a.status === 'sold') {
                        totalProfit += (a.sell_price || 0) - (a.price || 0);
                    } else {
                        totalValue += (a.price || 0) * (a.quantity || 1);
                        if (a.status === 'active') activeCount++;
                        else if (a.status === 'idle') idleCount++;
                    }
                });
                
                html += `<h2>总体概览</h2><table><tr><th>指标</th><th>数值</th></tr>`;
                html += `<tr><td>总资产价值</td><td>¥${totalValue.toLocaleString()}</td></tr>`;
                html += `<tr><td>物品总数</td><td>${allAssets.length}件</td></tr>`;
                html += `<tr><td>使用中</td><td>${activeCount}件</td></tr>`;
                html += `<tr><td>闲置</td><td>${idleCount}件</td></tr>`;
                html += `<tr><td>卖出盈亏</td><td class="${totalProfit >= 0 ? 'profit' : 'loss'}">${totalProfit >= 0 ? '+' : ''}¥${totalProfit.toLocaleString()}</td></tr>`;
                html += `</table>`;
                
                // 详细列表
                html += `<h2>物品明细</h2><table><tr><th>名称</th><th>分类</th><th>状态</th><th>价格</th><th>日均成本</th><th>位置</th></tr>`;
                allAssets.forEach(a => {
                    const buyDate = a.date || a.created_at?.split('T')[0];
                    const days = buyDate ? Math.max(1, Math.floor((today - new Date(buyDate)) / 86400000)) : 1;
                    const dailyCost = days > 0 ? (a.price || 0) / days : 0;
                    html += `<tr><td>${a.name}</td><td>${a.category}</td><td>${a.status}</td><td>¥${a.price}</td><td>¥${dailyCost.toFixed(2)}</td><td>${a.location || '-'}</td></tr>`;
                });
                html += `</table></body></html>`;
                downloadFile(html, `资产报告_${new Date().toISOString().split('T')[0]}.html`, 'text/html');
            } else if (type === 'summary') {
                const categoryStats = {};
                allAssets.forEach(a => {
                    const cat = a.category || '其他';
                    if (!categoryStats[cat]) categoryStats[cat] = { count: 0, value: 0 };
                    categoryStats[cat].count++;
                    if (a.status !== 'sold') categoryStats[cat].value += (a.price || 0) * (a.quantity || 1);
                });
                
                let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>资产汇总</title>`;
                html += `<style>body{font-family:-apple-system,sans-serif;padding:20px;max-width:600px;margin:0 auto}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:10px;text-align:left}th{background:#667eea;color:white}</style>`;
                html += `</head><body><h1>📋 资产分类汇总</h1>`;
                html += `<table><tr><th>分类</th><th>数量</th><th>价值</th></tr>`;
                Object.entries(categoryStats).sort((a,b) => b[1].value - a[1].value).forEach(([cat, stats]) => {
                    html += `<tr><td>${cat}</td><td>${stats.count}件</td><td>¥${stats.value.toLocaleString()}</td></tr>`;
                });
                html += `</table></body></html>`;
                downloadFile(html, `资产汇总_${new Date().toISOString().split('T')[0]}.html`, 'text/html');
            }
            document.getElementById('export-modal').classList.remove('active');
        }
        
        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // ========== 导入 ==========
        async function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        if (confirm(`确定要导入吗？这将替换当前 ${allAssets.length} 件物品。`)) {
                            allAssets = data;
                            await saveData();
                            renderAssets();
                            updateStats();
                            alert('导入成功！');
                        }
                    }
                } catch (err) { alert('导入失败: ' + err.message); }
            };
            reader.readAsText(file);
            event.target.value = '';
        }
        
        // ========== 搜索筛选 ==========
        function handleSearch() {
            searchKeyword = document.getElementById('search-input').value.toLowerCase();
            searchCategory = document.getElementById('filter-category').value;
            renderAssets();
        }
        
        // ========== 批量操作 ==========
        function toggleSelect(id) {
            if (selectedIds.has(id)) selectedIds.delete(id);
            else selectedIds.add(id);
            updateBatchBar();
            renderAssets();
        }
        
        function selectAll() {
            const filtered = getFilteredAssets();
            if (selectedIds.size === filtered.length) {
                selectedIds.clear();
            } else {
                filtered.forEach(a => selectedIds.add(a.id));
            }
            updateBatchBar();
            renderAssets();
        }
        
        function updateBatchBar() {
            const bar = document.getElementById('batch-bar');
            const count = document.getElementById('selected-count');
            if (selectedIds.size > 0) {
                bar.classList.add('active');
                count.textContent = `已选 ${selectedIds.size} 件`;
            } else {
                bar.classList.remove('active');
            }
        }
        
        async function batchSetStatus(status) {
            if (selectedIds.size === 0) return;
            const count = selectedIds.size;
            selectedIds.forEach(id => {
                const idx = allAssets.findIndex(a => a.id === id);
                if (idx !== -1) {
                    allAssets[idx].status = status;
                    allAssets[idx].updated_at = new Date().toISOString();
                    if (status === 'sold') {
                        allAssets[idx].sell_date = new Date().toISOString().split('T')[0];
                    }
                }
            });
            selectedIds.clear();
            updateBatchBar();
            await saveData();
            renderAssets();
            updateStats();
            alert(`已更新 ${count} 件物品状态`);
        }
        
        async function batchDelete() {
            if (selectedIds.size === 0) return;
            if (!confirm(`确定要删除选中的 ${selectedIds.size} 件物品吗？`)) return;
            allAssets = allAssets.filter(a => !selectedIds.has(a.id));
            selectedIds.clear();
            updateBatchBar();
            await saveData();
            renderAssets();
            updateStats();
            alert('已删除选中物品');
        }
        
        // ========== 统计和渲染 ==========
        function updateStats() {
            let totalValue = 0, idleCount = 0, totalProfit = 0, expireCount = 0, highValueCount = 0, totalDailyCost = 0, activeCount = 0;
            const today = new Date();
            const expireThreshold = 30;
            
            allAssets.forEach(a => {
                if (a.status === 'sold') {
                    totalProfit += (a.sell_price || 0) - (a.price || 0);
                } else {
                    totalValue += (a.price || 0) * (a.quantity || 1);
                    if (a.status === 'idle') idleCount++;
                    if (a.price >= 1000) highValueCount++;
                    
                    const buyDate = a.date || a.created_at?.split('T')[0];
                    if (buyDate) {
                        const days = Math.max(1, Math.floor((today - new Date(buyDate)) / 86400000));
                        totalDailyCost += (a.price || 0) / days;
                        activeCount++;
                    }
                    
                    if (a.expire_date) {
                        const daysToExpire = Math.floor((new Date(a.expire_date) - today) / 86400000);
                        if (daysToExpire <= expireThreshold && daysToExpire >= 0) expireCount++;
                    }
                }
            });
            
            document.getElementById('total-value').textContent = `¥${totalValue.toLocaleString()}`;
            document.getElementById('total-count').textContent = allAssets.length;
            document.getElementById('idle-count').textContent = idleCount;
            document.getElementById('avg-daily-cost').textContent = activeCount > 0 ? `¥${(totalDailyCost / activeCount).toFixed(1)}` : '¥0';
            document.getElementById('expire-count').textContent = expireCount;
            document.getElementById('high-value-count').textContent = highValueCount;
            
            const profitEl = document.getElementById('total-profit');
            const profitCard = document.getElementById('profit-card');
            if (totalProfit >= 0) { profitCard.classList.remove('loss'); profitEl.textContent = `+¥${totalProfit.toLocaleString()}`; }
            else { profitCard.classList.add('loss'); profitEl.textContent = `-¥${Math.abs(totalProfit).toLocaleString()}`; }
        }
        
        function getFilteredAssets() {
            const today = new Date();
            const expireThreshold = 30;
            
            return allAssets.filter(a => {
                // 状态筛选
                if (currentFilter === 'expiring') {
                    if (a.status === 'sold' || !a.expire_date) return false;
                    const daysToExpire = Math.floor((new Date(a.expire_date) - today) / 86400000);
                    return daysToExpire <= expireThreshold && daysToExpire >= 0;
                }
                if (currentFilter !== 'all' && a.status !== currentFilter) return false;
                
                // 搜索筛选
                if (searchKeyword) {
                    const nameMatch = a.name?.toLowerCase().includes(searchKeyword);
                    const tagMatch = a.tags?.toLowerCase().includes(searchKeyword);
                    const noteMatch = a.note?.toLowerCase().includes(searchKeyword);
                    if (!nameMatch && !tagMatch && !noteMatch) return false;
                }
                if (searchCategory && a.category !== searchCategory) return false;
                
                return true;
            });
        }
        
        // ========== 分析页面 ==========
        function renderAnalysis() {
            const today = new Date();
            const list = document.getElementById('asset-list');
            
            // 分类统计
            const categoryStats = {};
            const monthlyStats = {};
            const depreciationList = [];
            let totalValue = 0, totalCost = 0, totalProfit = 0;
            let activeCount = 0, idleCount = 0, soldCount = 0;
            
            // 颜色映射
            const colorMap = {
                '数码': '#667eea', '电脑': '#764ba2', '家电': '#f59e0b',
                '奢侈品': '#ec4899', '收藏': '#8b5cf6', '日用品': '#10b981',
                '食品': '#ef4444', '金融': '#3b82f6', '其他': '#6b7280'
            };
            
            allAssets.forEach(a => {
                const cat = a.category || '其他';
                if (!categoryStats[cat]) categoryStats[cat] = { count: 0, value: 0, countSold: 0, profit: 0, color: colorMap[cat] || colorMap['其他'] };
                categoryStats[cat].count++;
                
                if (a.status === 'sold') {
                    categoryStats[cat].countSold++;
                    categoryStats[cat].profit += (a.sell_price || 0) - (a.price || 0);
                    totalProfit += (a.sell_price || 0) - (a.price || 0);
                    soldCount++;
                } else {
                    categoryStats[cat].value += (a.price || 0) * (a.quantity || 1);
                    totalValue += (a.price || 0) * (a.quantity || 1);
                    if (a.status === 'active') activeCount++;
                    else if (a.status === 'idle') idleCount++;
                    
                    const buyDate = a.date || a.created_at?.split('T')[0];
                    if (buyDate) {
                        const days = Math.max(1, Math.floor((today - new Date(buyDate)) / 86400000));
                        totalCost += (a.price || 0) / days;
                        
                        // 折旧计算 (按5年折旧)
                        const originalPrice = a.price || 0;
                        const usefulLife = 5 * 365;
                        const depreciation = Math.min(originalPrice, originalPrice * (days / usefulLife));
                        const currentValue = originalPrice - depreciation;
                        if (days > 30) { // 超过30天才计算折旧
                            depreciationList.push({
                                name: a.name,
                                original: originalPrice,
                                current: Math.round(currentValue),
                                depreciation: Math.round(depreciation),
                                percent: Math.round((depreciation / originalPrice) * 100)
                            });
                        }
                    }
                }
                
                const month = (a.date || a.created_at?.split('T')[0] || '').substring(0, 7);
                if (month) {
                    if (!monthlyStats[month]) monthlyStats[month] = { count: 0, value: 0 };
                    monthlyStats[month].count++;
                    monthlyStats[month].value += (a.price || 0);
                }
            });
            
            const sortedCategories = Object.entries(categoryStats).sort((a, b) => b[1].value - a[1].value);
            const sortedMonths = Object.entries(monthlyStats).sort((a, b) => b[0].localeCompare(a[0])).slice(0, 6);
            const maxMonthValue = Math.max(...sortedMonths.map(m => m[1].value), 1);
            
            // 饼图数据
            const pieData = sortedCategories.filter(([_, s]) => s.value > 0);
            
            list.innerHTML = `
                <div class="analysis-section">
                    <h3>📈 总体概览</h3>
                    <div class="analysis-grid">
                        <div class="analysis-item"><span class="ai-label">总资产价值</span><span class="ai-value">¥${totalValue.toLocaleString()}</span></div>
                        <div class="analysis-item"><span class="ai-label">物品总数</span><span class="ai-value">${allAssets.length}件</span></div>
                        <div class="analysis-item"><span class="ai-label">使用中</span><span class="ai-value">${activeCount}件</span></div>
                        <div class="analysis-item"><span class="ai-label">闲置中</span><span class="ai-value">${idleCount}件</span></div>
                        <div class="analysis-item"><span class="ai-label">已卖出</span><span class="ai-value">${soldCount}件</span></div>
                        <div class="analysis-item"><span class="ai-label">平均日均成本</span><span class="ai-value">¥${(totalCost / Math.max(1, activeCount + idleCount)).toFixed(2)}</span></div>
                        <div class="analysis-item ${totalProfit >= 0 ? 'profit' : 'loss'}"><span class="ai-label">卖出总盈亏</span><span class="ai-value">${totalProfit >= 0 ? '+' : ''}¥${totalProfit.toLocaleString()}</span></div>
                    </div>
                </div>
                
                <div class="analysis-section">
                    <h3>🥧 分类占比</h3>
                    <div class="pie-chart">
                        <div style="width:120px;height:120px;border-radius:50%;background:conic-gradient(${pieData.map(([cat, s], i) => `${s.color} ${Math.round((s.value / totalValue) * 100)}%`).join(', ')});"></div>
                        <div class="pie-legend">
                            ${pieData.slice(0, 5).map(([cat, s]) => `
                                <div class="legend-item">
                                    <div class="legend-color" style="background:${s.color}"></div>
                                    <span>${cat} ¥${s.value.toLocaleString()}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
                
                <div class="analysis-section">
                    <h3>📊 月度购买趋势</h3>
                    <div class="bar-chart">
                        ${sortedMonths.map(([month, stats]) => `
                            <div class="bar-item">
                                <div class="bar-label"><span>${month}</span><span>¥${stats.value.toLocaleString()} (${stats.count}件)</span></div>
                                <div class="bar-track">
                                    <div class="bar-fill" style="width:${(stats.value / maxMonthValue) * 100}%;background:linear-gradient(90deg, #667eea, #764ba2)"></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                ${depreciationList.length > 0 ? `
                <div class="analysis-section">
                    <h3>📉 资产折旧（按5年折旧）</h3>
                    ${depreciationList.slice(0, 5).map(d => `
                        <div class="depreciation-card">
                            <div class="depreciation-header">
                                <div class="depreciation-name">${d.name}</div>
                                <div class="depreciation-original">¥${d.original}</div>
                            </div>
                            <div class="depreciation-current">¥${d.current}</div>
                            <div class="depreciation-bar">
                                <div class="depreciation-fill" style="width:${100 - d.percent}%"></div>
                            </div>
                            <div style="font-size:11px;color:#86868b;margin-top:4px">已折旧 ${d.percent}%</div>
                        </div>
                    `).join('')}
                </div>
                ` : ''}
                
                <div class="analysis-section">
                    <h3>📁 分类统计</h3>
                    ${sortedCategories.map(([cat, stats]) => `
                        <div class="category-row">
                            <div class="cat-name"><span class="legend-color" style="display:inline-block;width:10px;height:10px;background:${stats.color};border-radius:2px;margin-right:8px"></span>${cat}</div>
                            <div class="cat-stats">
                                <span>${stats.count}件</span>
                                <span>¥${stats.value.toLocaleString()}</span>
                                ${stats.countSold > 0 ? `<span class="${stats.profit >= 0 ? 'profit' : 'loss'}">卖出${stats.countSold}件 ${stats.profit >= 0 ? '+' : ''}¥${stats.profit.toLocaleString()}</span>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="analysis-section">
                    <h3>💡 建议</h3>
                    <div class="suggestions">
                        ${idleCount > 0 ? `<div class="suggestion">🔄 有 ${idleCount} 件闲置物品，建议考虑二手出售或继续使用</div>` : ''}
                        ${totalProfit < 0 ? `<div class="suggestion">📉 卖出亏损 ¥${Math.abs(totalProfit).toLocaleString()}，建议定价时参考市场行情</div>` : ''}
                        ${totalValue > 100000 ? `<div class="suggestion">💰 总资产较高，建议做好资产盘点和保险</div>` : ''}
                        ${idleCount === 0 && totalProfit >= 0 ? `<div class="suggestion">✅ 资产管理良好，继续保持！</div>` : ''}
                        ${depreciationList.length > 0 ? `<div class="suggestion">📉 ${depreciationList.length} 件物品已有折旧，可考虑是否继续持有</div>` : ''}
                    </div>
                </div>
            `;
        }
        
        function renderAssets() {
            const today = new Date();
            const expireThreshold = 30;
            
            // 分析页面
            if (currentFilter === 'analysis') {
                renderAnalysis();
                return;
            }
            
            const filtered = getFilteredAssets();
            const list = document.getElementById('asset-list');
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="icon">📦</div>暂无资产<br>点击右下角+添加</div>';
                return;
            }
            
            // 排序
            filtered.sort((a, b) => {
                if (a.expire_date && b.expire_date) {
                    return new Date(a.expire_date) - new Date(b.expire_date);
                }
                if (a.expire_date) return -1;
                if (b.expire_date) return 1;
                return new Date(b.created_at) - new Date(a.created_at);
            });
            
            list.innerHTML = filtered.map(asset => {
                const buyDate = asset.date || asset.created_at?.split('T')[0] || '-';
                const days = Math.max(1, Math.floor((today - new Date(buyDate)) / 86400000));
                const dailyCost = days > 0 ? ((asset.price || 0) / days).toFixed(2) : (asset.price || 0);
                const quantity = asset.quantity || 1;
                const isSelected = selectedIds.has(asset.id);
                
                let expireWarning = '';
                let statusClass = `status-${asset.status || 'active'}`;
                if (asset.expire_date && asset.status !== 'sold') {
                    const daysToExpire = Math.floor((new Date(asset.expire_date) - today) / 86400000);
                    if (daysToExpire <= 0) {
                        expireWarning = `<div class="expire-warning" style="background:#fee2e2;border-color:#dc2626;">⚠️ 已过期 ${Math.abs(daysToExpire)} 天</div>`;
                        statusClass = 'status-expired';
                    } else if (daysToExpire <= expireThreshold) {
                        expireWarning = `<div class="expire-warning">⏰ 还有 ${daysToExpire} 天过期</div>`;
                    }
                }
                
                const tags = asset.tags ? asset.tags.split(',').map(t => `<span class="tag">${t.trim()}</span>`).join('') : '';
                const locationHtml = asset.location ? `<div class="cost-item"><span class="cost-label">位置</span><div class="cost-value">${asset.location}</div></div>` : '';
                const warrantyHtml = asset.warranty_date ? `<div class="cost-item"><span class="cost-label">保修</span><div class="cost-value">${asset.warranty_date}</div></div>` : '';
                
                const profitHtml = asset.status === 'sold' && asset.sell_price
                    ? `<div class="cost-item"><span class="cost-label">盈亏</span><div class="cost-value ${asset.sell_price >= asset.price ? 'profit' : 'loss'}">${asset.sell_price >= asset.price ? '+' : ''}¥${(asset.sell_price - asset.price).toLocaleString()}</div></div>`
                    : `<div class="cost-item"><span class="cost-label">日均成本</span><div class="cost-value">¥${dailyCost}</div></div>`;
                
                const sellInfoHtml = asset.status === 'sold' 
                    ? `<div class="cost-item"><span class="cost-label">卖出价格</span><div class="cost-value">¥${Number(asset.sell_price).toLocaleString()}</div></div>
                       ${asset.sell_buyer ? `<div class="cost-item"><span class="cost-label">买家</span><div class="cost-value">${asset.sell_buyer}</div></div>` : ''}`
                    : '';
                
                const quantityHtml = quantity > 1 ? `<div class="cost-item"><span class="cost-label">数量</span><div class="cost-value">${quantity}</div></div>` : '';
                const expireHtml = asset.expire_date && asset.status !== 'sold' 
                    ? `<div class="cost-item"><span class="cost-label">过期日期</span><div class="cost-value">${asset.expire_date}</div></div>` : '';
                
                return `<div class="asset-card ${isSelected ? 'selected' : ''}">
                    <div class="asset-header">
                        <div style="display:flex;align-items:center;gap:8px;">
                            <input type="checkbox" class="checkbox" ${isSelected ? 'checked' : ''} onclick="toggleSelect('${asset.id}')">
                            <div>
                                <div class="asset-name">${asset.name}</div>
                                <div class="asset-meta"><span>${buyDate}</span><span>${days}天</span>${tags}</div>
                            </div>
                        </div>
                        <div style="text-align:right">
                            <span class="asset-status ${statusClass}">${asset.status==='active'?'使用中':asset.status==='idle'?'闲置':asset.status==='sold'?'已卖出':'已过期'}</span>
                            <div style="margin-top:4px;font-size:11px;color:#86868b">${asset.category||'其他'}</div>
                        </div>
                    </div>
                    <div class="asset-price">¥${Number(asset.price).toLocaleString()}${quantity > 1 ? ` × ${quantity}` : ''}</div>
                    ${expireWarning}
                    <div class="asset-cost">${profitHtml}${quantityHtml}${expireHtml}${sellInfoHtml}${locationHtml}${warrantyHtml}</div>
                    <div class="asset-actions">
                        ${asset.status !== 'sold' ? `
                            <button class="btn btn-sell" onclick="openSellModal('${asset.id}')">卖出</button>
                            ${asset.status === 'idle' ? `<button class="btn btn-active" onclick="markStatus('${asset.id}', 'active')">启用</button>` : `<button class="btn btn-idle" onclick="markStatus('${asset.id}', 'idle')">闲置</button>`}
                        ` : ''}
                        <button class="btn btn-edit" onclick="editAsset('${asset.id}')">编辑</button>
                        <button class="btn btn-delete" onclick="deleteAsset('${asset.id}')">删除</button>
                    </div>
                </div>`;
            }).join('');
        }
        
        // ========== 事件处理 ==========
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                selectedIds.clear();
                updateBatchBar();
                renderAssets();
            });
        });
        
        document.getElementById('add-btn').addEventListener('click', () => {
            document.getElementById('modal-title').textContent = '添加资产';
            document.getElementById('asset-form').reset();
            document.getElementById('asset-id').value = '';
            document.getElementById('asset-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('asset-quantity').value = 1;
            document.getElementById('add-modal').classList.add('active');
        });
        
        document.getElementById('close-modal').addEventListener('click', () => document.getElementById('add-modal').classList.remove('active'));
        document.getElementById('close-sell-modal').addEventListener('click', () => document.getElementById('sell-modal').classList.remove('active'));
        document.querySelectorAll('.modal').forEach(modal => { modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); }); });
        
        document.getElementById('asset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('asset-id').value;
            const now = new Date().toISOString();
            let asset;
            
            const formData = {
                name: document.getElementById('asset-name').value,
                price: parseFloat(document.getElementById('asset-price').value),
                date: document.getElementById('asset-date').value,
                category: document.getElementById('asset-category').value,
                status: document.getElementById('asset-status').value,
                expire_date: document.getElementById('asset-expire').value || null,
                quantity: parseInt(document.getElementById('asset-quantity').value) || 1,
                location: document.getElementById('asset-location').value || null,
                warranty_date: document.getElementById('asset-warranty').value || null,
                tags: document.getElementById('asset-tags').value,
                note: document.getElementById('asset-note').value
            };
            
            if (id) {
                const idx = allAssets.findIndex(a => a.id === id);
                if (idx !== -1) {
                    asset = { ...allAssets[idx], ...formData, updated_at: now };
                    allAssets[idx] = asset;
                }
            } else {
                asset = { 
                    id: Date.now().toString(), 
                    ...formData,
                    sell_price: null, 
                    sell_date: null, 
                    sell_buyer: null,
                    created_at: now, 
                    updated_at: now 
                };
                allAssets.push(asset);
            }
            
            await saveData();
            renderAssets();
            updateStats();
            document.getElementById('add-modal').classList.remove('active');
        });
        
        function editAsset(id) {
            const asset = allAssets.find(a => a.id === id);
            if (!asset) return;
            document.getElementById('modal-title').textContent = '编辑资产';
            document.getElementById('asset-id').value = asset.id;
            document.getElementById('asset-name').value = asset.name;
            document.getElementById('asset-price').value = asset.price;
            document.getElementById('asset-date').value = asset.date || '';
            document.getElementById('asset-category').value = asset.category || '其他';
            document.getElementById('asset-status').value = asset.status || 'active';
            document.getElementById('asset-expire').value = asset.expire_date || '';
            document.getElementById('asset-quantity').value = asset.quantity || 1;
            document.getElementById('asset-location').value = asset.location || '';
            document.getElementById('asset-warranty').value = asset.warranty_date || '';
            document.getElementById('asset-tags').value = asset.tags || '';
            document.getElementById('asset-note').value = asset.note || '';
            document.getElementById('add-modal').classList.add('active');
        }
        
        async function deleteAsset(id) {
            if (!confirm('确定要删除吗？')) return;
            allAssets = allAssets.filter(a => a.id !== id);
            await saveData();
            renderAssets();
            updateStats();
        }
        
        function openSellModal(id) {
            document.getElementById('sell-asset-id').value = id;
            document.getElementById('sell-price').value = '';
            document.getElementById('sell-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('sell-buyer').value = '';
            document.getElementById('sell-modal').classList.add('active');
        }
        
        document.getElementById('sell-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('sell-asset-id').value;
            const idx = allAssets.findIndex(a => a.id === id);
            if (idx !== -1) {
                allAssets[idx].status = 'sold';
                allAssets[idx].sell_price = parseFloat(document.getElementById('sell-price').value);
                allAssets[idx].sell_date = document.getElementById('sell-date').value;
                allAssets[idx].sell_buyer = document.getElementById('sell-buyer').value || null;
                allAssets[idx].updated_at = new Date().toISOString();
                await saveData();
            }
            renderAssets();
            updateStats();
            document.getElementById('sell-modal').classList.remove('active');
        });
        
        async function markStatus(id, status) {
            const idx = allAssets.findIndex(a => a.id === id);
            if (idx !== -1) {
                allAssets[idx].status = status;
                allAssets[idx].updated_at = new Date().toISOString();
                await saveData();
            }
            renderAssets();
            updateStats();
        }
        
        // ========== 初始化 ==========
        // v2.2.0 - added search, batch, export, charts, depreciation
        loadData();
        
        document.addEventListener('visibilitychange', () => { if (!document.hidden) loadData(); });
        window.addEventListener('focus', () => loadData());
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/asset-tracker/sw.js').then(reg => reg.update()).catch(() => {});
        }
    </script>
</body>
</html>
