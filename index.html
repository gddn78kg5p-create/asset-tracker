<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>资产追踪 Pro</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); color: #1a1a2e; min-height: 100vh; position: relative; }
        body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }
        
        .container { position: relative; z-index: 1; }
        
        /* 顶部 */
        .header { padding: 18px 14px 14px; background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); }
        .header h1 { font-size: 26px; font-weight: 800; margin-bottom: 14px; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.2); letter-spacing: -0.5px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .stat-card { background: rgba(255,255,255,0.25); border-radius: 16px; padding: 16px 10px; text-align: center; border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(10px); }
        .stat-card .label { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 600; }
        .stat-card .value { font-size: 24px; font-weight: 800; margin-top: 6px; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        
        .content { padding: 12px 10px; }
        
        /* 板块 */
        .section { background: rgba(255,255,255,0.9); border-radius: 18px; padding: 14px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.5); backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(102,126,234,0.15); }
        .section h3 { font-size: 14px; color: #667eea; margin-bottom: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        
        /* 折旧 - 紧凑4列 */
        .dep-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .dep-item { background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.05)); border-radius: 12px; padding: 10px 8px; text-align: center; border: 1px solid rgba(102,126,234,0.15); }
        .dep-name { font-size: 14px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .dep-values { display: flex; flex-direction: column; gap: 2px; }
        .dep-original { font-size: 11px; color: rgba(26,26,46,0.4); text-decoration: line-through; }
        .dep-current { font-size: 18px; font-weight: 800; color: #667eea; }
        .dep-down { font-size: 11px; color: #e74c3c; font-weight: 600; }
        
        /* 分类+月度并排 */
        .dual-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .dual-section .section { margin-bottom: 0; }
        
        /* 分类 */
        .cat-list { display: flex; flex-direction: column; gap: 6px; }
        .cat-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 14px; border-bottom: 1px solid rgba(102,126,234,0.1); }
        .cat-row:last-child { border-bottom: none; }
        .cat-dot { width: 10px; height: 10px; border-radius: 3px; margin-right: 8px; display: inline-block; }
        .cat-stats { color: rgba(26,26,46,0.5); font-size: 13px; }
        
        /* 月度 */
        .month-list { display: flex; flex-direction: column; gap: 6px; }
        .month-row { position: relative; padding: 6px 8px; display: flex; justify-content: space-between; font-size: 13px; border-radius: 8px; background: rgba(102,126,234,0.05); }
        
        /* 搜索 */
        .search-bar { display: flex; gap: 8px; margin-bottom: 10px; }
        .search-bar input { flex: 1; padding: 14px 16px; border: 1px solid rgba(255,255,255,0.3); border-radius: 14px; font-size: 16px; background: rgba(255,255,255,0.9); color: #1a1a2e; }
        .search-bar input::placeholder { color: rgba(26,26,46,0.4); }
        .search-bar select { padding: 14px; border: 1px solid rgba(255,255,255,0.3); border-radius: 14px; font-size: 15px; background: rgba(255,255,255,0.9); color: #1a1a2e; }
        
        .tabs { display: flex; background: rgba(255,255,255,0.9); border-radius: 14px; padding: 4px; margin-bottom: 10px; }
        .tab { flex: 1; padding: 12px 6px; text-align: center; font-size: 14px; cursor: pointer; border-radius: 10px; color: rgba(26,26,46,0.5); font-weight: 600; }
        .tab.active { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        
        .batch-bar { display: none; background: rgba(251,191,36,0.2); padding: 10px 12px; border-radius: 12px; margin-bottom: 10px; align-items: center; justify-content: space-between; font-size: 14px; border: 1px solid rgba(251,191,36,0.3); }
        .batch-bar.active { display: flex; }
        .batch-btn { padding: 8px 14px; border-radius: 8px; font-size: 13px; border: none; cursor: pointer; margin-left: 8px; font-weight: 600; }
        .batch-btn.sell { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .batch-btn.idle { background: rgba(251,191,36,0.3); color: #b45309; }
        .batch-btn.delete { background: rgba(231,76,60,0.2); color: #e74c3c; }
        
        /* 物品卡片 */
        .asset-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .asset-card { background: rgba(255,255,255,0.95); border-radius: 18px; padding: 14px; border: 1px solid rgba(255,255,255,0.5); backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(102,126,234,0.1); }
        .asset-card.selected { border: 2px solid #667eea; box-shadow: 0 0 30px rgba(102,126,234,0.3); }
        .asset-name { font-size: 17px; font-weight: 700; margin-bottom: 8px; color: #1a1a2e; }
        .asset-price { font-size: 28px; font-weight: 800; color: #667eea; margin: 8px 0; }
        .asset-meta { font-size: 13px; color: rgba(26,26,46,0.5); }
        .asset-status { font-size: 11px; padding: 4px 10px; border-radius: 8px; font-weight: 700; margin-left: 8px; }
        .status-active { background: rgba(74,222,128,0.2); color: #16a34a; }
        .status-idle { background: rgba(251,191,36,0.2); color: #b45309; }
        .status-sold { background: rgba(102,126,234,0.2); color: #667eea; }
        .asset-card .asset-actions { display: flex; gap: 8px; margin-top: 12px; }
        .asset-card .btn { padding: 8px 14px; border-radius: 10px; font-size: 13px; border: none; cursor: pointer; font-weight: 600; }
        .asset-card .btn-sell { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .asset-card .btn-idle { background: rgba(251,191,36,0.2); color: #b45309; }
        .asset-card .btn-edit { background: rgba(102,126,234,0.15); color: #667eea; }
        .asset-card .btn-delete { background: rgba(231,76,60,0.15); color: #e74c3c; }
        .asset-card .checkbox { width: 20px; height: 20px; accent-color: #667eea; }
        .expire-warn { background: rgba(251,191,36,0.2); font-size: 11px; padding: 3px 8px; border-radius: 6px; color: #b45309; margin-left: 8px; }
        .tag { display: inline-block; background: rgba(102,126,234,0.15); color: #667eea; font-size: 11px; padding: 3px 8px; border-radius: 6px; margin-right: 4px; font-weight: 600; }
        
        .fab { position: fixed; bottom: 24px; right: 16px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); color: white; font-size: 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 32px rgba(102,126,234,0.4); cursor: pointer; border: none; z-index: 100; }
        .fab-menu { position: fixed; bottom: 94px; right: 16px; display: none; flex-direction: column; gap: 10px; z-index: 99; }
        .fab-menu.active { display: flex; }
        .fab-item { padding: 14px 20px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 24px; font-size: 15px; color: #1a1a2e; border: 1px solid rgba(255,255,255,0.5); cursor: pointer; font-weight: 600; box-shadow: 0 4px 20px rgba(102,126,234,0.15); }
        .sync-bar { position: fixed; top: 12px; right: 12px; display: flex; gap: 8px; z-index: 100; }
        .sync-btn { padding: 10px 14px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; font-size: 14px; color: #1a1a2e; cursor: pointer; }
        .sync-status { padding: 10px 14px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 12px; font-size: 13px; color: rgba(26,26,46,0.6); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(102,126,234,0.3); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: #fff; border-radius: 24px; padding: 24px; width: 100%; max-width: 380px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(102,126,234,0.3); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h2 { font-size: 22px; font-weight: 800; color: #667eea; }
        .modal-close { width: 36px; height: 36px; border-radius: 50%; background: rgba(102,126,234,0.1); border: none; font-size: 20px; color: rgba(26,26,46,0.5); cursor: pointer; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; color: rgba(26,26,46,0.6); margin-bottom: 8px; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 14px 16px; border: 1px solid rgba(102,126,234,0.2); border-radius: 14px; font-size: 16px; background: rgba(102,126,234,0.05); color: #1a1a2e; }
        .form-group input::placeholder { color: rgba(26,26,46,0.3); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-submit { width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 14px; font-size: 17px; font-weight: 800; cursor: pointer; }
        .empty-state { text-align: center; padding: 40px; color: rgba(26,26,46,0.4); font-size: 16px; grid-column: 1 / -1; }
        #scanner-container { width: 100%; margin-bottom: 14px; border-radius: 14px; overflow: hidden; }
        .camera-preview { width: 100%; border-radius: 14px; margin-bottom: 14px; }
        .export-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
        .export-btn { padding: 14px; background: rgba(102,126,234,0.1); border: 1px solid rgba(102,126,234,0.2); border-radius: 14px; text-align: center; cursor: pointer; font-size: 15px; color: #667eea; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
    <div class="sync-bar">
        <div class="sync-status" id="sync-status">🔄</div>
        <button class="sync-btn" onclick="openSettingsModal()">⚙️</button>
        <button class="sync-btn" onclick="showExportModal()">📤</button>
    </div>
    
    <div class="header">
        <h1>💰 资产追踪</h1>
        <div class="stats">
            <div class="stat-card"><div class="label">总资产</div><div class="value" id="total-value">¥0</div></div>
            <div class="stat-card"><div class="label">数量</div><div class="value" id="total-count">0</div></div>
            <div class="stat-card"><div class="label">闲置</div><div class="value" id="idle-count">0</div></div>
            <div class="stat-card"><div class="label">盈亏</div><div class="value" id="total-profit">¥0</div></div>
        </div>
    </div>
    
    <div class="content">
        <!-- 折旧 -->
        <div class="section" id="dep-section" style="display:none">
            <h3>📉 资产折旧</h3>
            <div class="dep-grid" id="dep-list"></div>
        </div>
        
        <!-- 分类+月度并排 -->
        <div class="dual-section">
            <div class="section" id="cat-section" style="display:none">
                <h3>📁 分类</h3>
                <div class="cat-list" id="cat-list"></div>
            </div>
            <div class="section" id="month-section" style="display:none">
                <h3>📈 月度趋势</h3>
                <div class="month-list" id="month-list"></div>
            </div>
        </div>
        
        <!-- 搜索 -->
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="🔍 搜索..." oninput="handleSearch()">
            <select id="filter-category" onchange="handleSearch()">
                <option value="">全部</option>
                <option value="数码">📱</option>
                <option value="电脑">💻</option>
                <option value="家电">🎮</option>
                <option value="奢侈品">👜</option>
                <option value="收藏">🎨</option>
                <option value="日用品">🧴</option>
                <option value="食品">🍎</option>
                <option value="金融">📈</option>
                <option value="其他">📦</option>
            </select>
        </div>
        
        <!-- 批量 -->
        <div class="batch-bar" id="batch-bar">
            <span id="selected-count">已选 0</span>
            <div>
                <button class="batch-btn sell" onclick="batchSetStatus('sold')">卖出</button>
                <button class="batch-btn idle" onclick="batchSetStatus('idle')">闲置</button>
                <button class="batch-btn delete" onclick="batchDelete()">删除</button>
            </div>
        </div>
        
        <div class="tabs">
            <div class="tab active" data-filter="all">全部</div>
            <div class="tab" data-filter="active">使用中</div>
            <div class="tab" data-filter="idle">闲置</div>
            <div class="tab" data-filter="sold">已卖出</div>
        </div>
        
        <div class="asset-grid" id="asset-list"><div class="empty-state">暂无资产</div></div>
    </div>
    </div>
    
    <button class="fab" onclick="toggleFabMenu()">+</button>
    <div class="fab-menu" id="fab-menu">
        <div class="fab-item" onclick="openAddModal()">➕ 手动添加</div>
        <div class="fab-item" onclick="openScanModal()">📷 扫码录入</div>
        <div class="fab-item" onclick="openPhotoModal()">📸 拍照识别</div>
    </div>
    
    <!-- 设置 -->
    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header"><h2>⚙️ 设置</h2><button class="modal-close" onclick="closeModal('settings-modal')">×</button></div>
            <div class="form-group"><label>GitHub Token</label><input type="password" id="settings-token"></div>
            <div class="form-group"><label>Gist ID</label><input type="text" id="settings-gist-id"></div>
            <button class="btn-submit" onclick="saveSettings()">保存</button>
        </div>
    </div>
    
    <!-- 导出 -->
    <div class="modal" id="export-modal">
        <div class="modal-content">
            <div class="modal-header"><h2>📤 导出</h2><button class="modal-close" onclick="closeModal('export-modal')">×</button></div>
            <div class="export-options">
                <div class="export-btn" onclick="exportData('json')">📄 JSON</div>
                <div class="export-btn" onclick="exportData('csv')">📊 CSV</div>
            </div>
        </div>
    </div>
    
    <!-- 添加/编辑 -->
    <div class="modal" id="add-modal">
        <div class="modal-content">
            <div class="modal-header"><h2 id="modal-title">添加资产</h2><button class="modal-close" onclick="closeModal('add-modal')">×</button></div>
            <form id="asset-form">
                <input type="hidden" id="asset-id">
                <div class="form-group"><label>物品名称 *</label><input type="text" id="asset-name" required placeholder="例如：iPhone 15 Pro"></div>
                <div class="form-row">
                    <div class="form-group"><label>购买价格(元) *</label><input type="number" id="asset-price" required min="0" placeholder="8999"></div>
                    <div class="form-group"><label>购买日期</label><input type="date" id="asset-date"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>分类</label>
                        <select id="asset-category">
                            <option value="数码">📱 数码</option>
                            <option value="电脑">💻 电脑</option>
                            <option value="家电">🎮 家电</option>
                            <option value="奢侈品">👜 奢侈品</option>
                            <option value="收藏">🎨 收藏</option>
                            <option value="日用品">🧴 日用品</option>
                            <option value="食品">🍎 食品</option>
                            <option value="金融">📈 金融</option>
                            <option value="其他">📦 其他</option>
                        </select>
                    </div>
                    <div class="form-group"><label>状态</label>
                        <select id="asset-status"><option value="active">使用中</option><option value="idle">闲置</option></select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>过期日期</label><input type="date" id="asset-expire"></div>
                    <div class="form-group"><label>数量</label><input type="number" id="asset-quantity" value="1" min="1"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>⭐ 折旧年限</label><input type="number" id="asset-dep-years" value="5" min="1" max="30" placeholder="默认5年"></div>
                    <div class="form-group"><label>存放位置</label><input type="text" id="asset-location" placeholder="卧室"></div>
                </div>
                <div class="form-group"><label>条码</label><input type="text" id="asset-barcode" placeholder="扫码自动填充"></div>
                <div class="form-group"><label>标签（逗号分隔）</label><input type="text" id="asset-tags" placeholder="自用,投资"></div>
                <button type="submit" class="btn-submit">保存</button>
            </form>
        </div>
    </div>
    
    <!-- 扫码 -->
    <div class="modal" id="scan-modal">
        <div class="modal-content">
            <div class="modal-header"><h2>📷 扫码录入</h2><button class="modal-close" onclick="closeScanModal()">×</button></div>
            <div id="scanner-container"></div>
            <div id="scan-result" style="display:none;background:rgba(102,126,234,0.1);padding:14px;border-radius:14px;font-size:16px;margin-bottom:14px"></div>
            <button class="btn-submit" id="use-scan-btn" style="display:none" onclick="useScanResult()">使用此条码</button>
        </div>
    </div>
    
    <!-- 拍照 -->
    <div class="modal" id="photo-modal">
        <div class="modal-content">
            <div class="modal-header"><h2>📸 拍照识别</h2><button class="modal-close" onclick="closePhotoModal()">×</button></div>
            <video id="camera-preview" class="camera-preview" autoplay playsinline style="display:none"></video>
            <canvas id="photo-canvas" style="display:none"></canvas>
            <img id="captured-photo" class="camera-preview" style="display:none">
            <div style="display:flex;gap:12px;margin-bottom:14px">
                <button class="btn btn-sell" id="capture-btn" onclick="capturePhoto()" style="flex:1">📸 拍照</button>
                <button class="btn btn-edit" id="retake-btn" style="display:none;flex:1" onclick="retakePhoto()">重拍</button>
            </div>
            <div id="photo-analysis" style="display:none">
                <div class="form-group"><label>物品名称</label><input type="text" id="photo-name" placeholder="识别结果"></div>
                <div class="form-group"><label>预估价格</label><input type="number" id="photo-price" placeholder="预估价格"></div>
            </div>
            <button class="btn-submit" id="use-photo-btn" style="display:none" onclick="usePhotoResult()">添加</button>
        </div>
    </div>
    
    <!-- 卖出 -->
    <div class="modal" id="sell-modal">
        <div class="modal-content">
            <div class="modal-header"><h2>💰 卖出资产</h2><button class="modal-close" onclick="closeModal('sell-modal')">×</button></div>
            <form id="sell-form">
                <input type="hidden" id="sell-asset-id">
                <div class="form-group"><label>卖出价格(元)</label><input type="number" id="sell-price" required min="0"></div>
                <div class="form-group"><label>卖出日期</label><input type="date" id="sell-date"></div>
                <button type="submit" class="btn-submit">确认卖出</button>
            </form>
        </div>
    </div>

    <script>
        const GIST_ID_KEY = 'asset_tracker_gist_id', TOKEN_KEY = 'asset_tracker_token', LOCAL_KEY = 'asset_tracker_data';
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('token')) localStorage.setItem(TOKEN_KEY, urlParams.get('token'));
        if (urlParams.get('gist')) localStorage.setItem(GIST_ID_KEY, urlParams.get('gist'));
        
        let githubToken = localStorage.getItem(TOKEN_KEY) || '', gistId = localStorage.getItem(GIST_ID_KEY) || '';
        let allAssets = [], currentFilter = 'all', selectedIds = new Set(), searchKeyword = '', searchCategory = '';
        let html5QrCode = null, cameraStream = null;
        
        const colorMap = {'数码':'#667eea','电脑':'#764ba2','家电':'#f093fb','奢侈品':'#ec4899','收藏':'#8b5cf6','日用品':'#4ade80','食品':'#f87171','金融':'#22d3ee','其他':'#6b7280'};
        
        function updateSyncStatus(s) { document.getElementById('sync-status').textContent = s === 'syncing' ? '🔄' : s === 'synced' ? '☁️' : s === 'error' ? '⚠️' : '📱'; }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        
        async function loadData() {
            updateSyncStatus('loading');
            try {
                const res = await fetch(`https://api.github.com/gists/${gistId}?t=${Date.now()}`, { headers: { 'Authorization': `token ${githubToken}` } });
                if (res.ok) { const d = await res.json(); if (d.files?.['assets.json']) { allAssets = JSON.parse(d.files['assets.json'].content); localStorage.setItem(LOCAL_KEY, JSON.stringify(allAssets)); updateSyncStatus('synced'); renderAll(); return; } }
            } catch(e) {}
            const local = localStorage.getItem(LOCAL_KEY); if (local) try { allAssets = JSON.parse(local); } catch(e2) {}
            updateSyncStatus('error'); renderAll();
        }
        
        async function saveData() {
            localStorage.setItem(LOCAL_KEY, JSON.stringify(allAssets));
            if (!githubToken || !gistId) return;
            try { await fetch(`https://api.github.com/gists/${gistId}`, { method: 'PATCH', headers: { 'Authorization': `token ${githubToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ files: { 'assets.json': { content: JSON.stringify(allAssets, null, 2) } } }) }); updateSyncStatus('synced'); } catch(e) { updateSyncStatus('error'); }
        }
        
        function renderAnalysis() {
            const today = new Date();
            let totalValue = 0, idleCount = 0, totalProfit = 0, expireCount = 0, highValueCount = 0, totalDailyCost = 0, activeCount = 0, soldCount = 0;
            const categoryStats = {}, monthlyStats = {}, depreciationList = [];
            
            allAssets.forEach(a => {
                const cat = a.category || '其他';
                if (!categoryStats[cat]) categoryStats[cat] = { count: 0, value: 0, countSold: 0, profit: 0, color: colorMap[cat] || colorMap['其他'] };
                categoryStats[cat].count++;
                
                if (a.status === 'sold') {
                    categoryStats[cat].countSold++;
                    categoryStats[cat].profit += (a.sell_price || 0) - (a.price || 0);
                    totalProfit += (a.sell_price || 0) - (a.price || 0);
                    soldCount++;
                } else {
                    totalValue += (a.price || 0) * (a.quantity || 1);
                    categoryStats[cat].value += (a.price || 0) * (a.quantity || 1);
                    if (a.status === 'idle') idleCount++;
                    else activeCount++;
                    if (a.price >= 1000) highValueCount++;
                    
                    const buyDate = a.date || a.created_at?.split('T')[0];
                    if (buyDate) {
                        const days = Math.max(1, Math.floor((today - new Date(buyDate)) / 86400000));
                        totalDailyCost += (a.price || 0) / days;
                        
                        // 折旧 - 使用自定义年限
                        const depYears = a.dep_years || 5;
                        if (days > 30 && a.price > 100) {
                            const original = a.price || 0;
                            const depreciationRate = Math.min(1, days / (depYears * 365));
                            const currentValue = Math.round(original * (1 - depreciationRate));
                            const lossAmount = original - currentValue;
                            if (lossAmount > 10) {
                                depreciationList.push({ name: a.name, original, current: currentValue, loss: lossAmount, percent: Math.round(depreciationRate * 100), depYears });
                            }
                        }
                    }
                    
                    if (a.expire_date) { const d = Math.floor((new Date(a.expire_date) - today) / 86400000); if (d <= 30 && d >= 0) expireCount++; }
                }
                
                const month = (a.date || a.created_at?.split('T')[0] || '').substring(0, 7);
                if (month) { if (!monthlyStats[month]) monthlyStats[month] = { count: 0, value: 0 }; monthlyStats[month].count++; monthlyStats[month].value += (a.price || 0); }
            });
            
            // 更新顶部统计
            document.getElementById('total-value').textContent = `¥${totalValue.toLocaleString()}`;
            document.getElementById('total-count').textContent = allAssets.length;
            document.getElementById('idle-count').textContent = idleCount;
            document.getElementById('total-profit').textContent = totalProfit >= 0 ? `+¥${totalProfit.toLocaleString()}` : `-¥${Math.abs(totalProfit).toLocaleString()}`;
            
            // 折旧列表 - 紧凑4列
            if (depreciationList.length > 0) {
                depreciationList.sort((a, b) => b.loss - a.loss);
                document.getElementById('dep-section').style.display = 'block';
                document.getElementById('dep-list').innerHTML = depreciationList.map(d => `
                    <div class="dep-item">
                        <div class="dep-name">${d.name}</div>
                        <div class="dep-values">
                            <div class="dep-original">¥${d.original.toLocaleString()}</div>
                            <div class="dep-current">¥${d.current.toLocaleString()}</div>
                            <div class="dep-down">-¥${d.loss}</div>
                        </div>
                    </div>
                `).join('');
            } else { document.getElementById('dep-section').style.display = 'none'; }
            
            // 分类
            const sortedCats = Object.entries(categoryStats).sort((a, b) => b[1].value - a[1].value);
            const pieData = sortedCats.filter(([_, s]) => s.value > 0);
            if (pieData.length > 0) {
                document.getElementById('cat-section').style.display = 'block';
                document.getElementById('cat-list').innerHTML = pieData.slice(0, 5).map(([cat, s]) => `
                    <div class="cat-row">
                        <div><span class="cat-dot" style="background:${s.color}"></span>${cat}</div>
                        <div class="cat-stats">${s.count}件</div>
                    </div>
                `).join('');
            } else { document.getElementById('cat-section').style.display = 'none'; }
            
            // 月度
            const sortedMonths = Object.entries(monthlyStats).sort((a, b) => b[0].localeCompare(a[0])).slice(0, 4);
            if (sortedMonths.length > 0) {
                document.getElementById('month-section').style.display = 'block';
                document.getElementById('month-list').innerHTML = sortedMonths.map(([m, s]) => `
                    <div class="month-row">
                        <div>${m.slice(5)}</div>
                        <div>¥${s.value.toLocaleString()}</div>
                    </div>
                `).join('');
            } else { document.getElementById('month-section').style.display = 'none'; }
        }
        
        function renderAll() { renderAnalysis(); renderAssets(); }
        function handleSearch() { searchKeyword = document.getElementById('search-input').value.toLowerCase(); searchCategory = document.getElementById('filter-category').value; renderAssets(); }
        
        function getFilteredAssets() {
            return allAssets.filter(a => {
                if (currentFilter !== 'all' && a.status !== currentFilter) return false;
                if (searchKeyword && !a.name?.toLowerCase().includes(searchKeyword) && !a.tags?.toLowerCase().includes(searchKeyword)) return false;
                if (searchCategory && a.category !== searchCategory) return false;
                return true;
            });
        }
        
        function toggleSelect(id) { if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id); updateBatchBar(); renderAssets(); }
        function updateBatchBar() { const bar = document.getElementById('batch-bar'); if (selectedIds.size > 0) { bar.classList.add('active'); document.getElementById('selected-count').textContent = `已选 ${selectedIds.size}`; } else bar.classList.remove('active'); }
        
        async function batchSetStatus(status) { if (selectedIds.size === 0) return; selectedIds.forEach(id => { const idx = allAssets.findIndex(a => a.id === id); if (idx !== -1) { allAssets[idx].status = status; allAssets[idx].updated_at = new Date().toISOString(); } }); selectedIds.clear(); updateBatchBar(); await saveData(); renderAll(); }
        async function batchDelete() { if (selectedIds.size === 0 || !confirm(`删除 ${selectedIds.size} 件？`)) return; allAssets = allAssets.filter(a => !selectedIds.has(a.id)); selectedIds.clear(); updateBatchBar(); await saveData(); renderAll(); }
        
        function renderAssets() {
            const today = new Date();
            const filtered = getFilteredAssets();
            const list = document.getElementById('asset-list');
            if (filtered.length === 0) { list.innerHTML = '<div class="empty-state">暂无资产，点击右下角 + 添加</div>'; return; }
            
            filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            
            list.innerHTML = filtered.map(a => {
                const buyDate = a.date || a.created_at?.split('T')[0] || '-';
                const days = Math.max(1, Math.floor((today - new Date(buyDate)) / 86400000));
                const isSelected = selectedIds.has(a.id);
                
                let expireWarn = '';
                if (a.expire_date && a.status !== 'sold') {
                    const d = Math.floor((new Date(a.expire_date) - today) / 86400000);
                    if (d <= 30 && d >= 0) expireWarn = `<span class="expire-warn">${d}天后过期</span>`;
                }
                
                const tags = a.tags ? a.tags.split(',').map(t => `<span class="tag">${t.trim()}</span>`).join('') : '';
                
                return `<div class="asset-card ${isSelected ? 'selected' : ''}">
                    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
                        <input type="checkbox" class="checkbox" ${isSelected ? 'checked' : ''} onclick="toggleSelect('${a.id}')">
                        <div class="asset-name">${a.name}</div>
                        <span class="asset-status status-${a.status || 'active'}">${a.status==='active'?'使用中':a.status==='idle'?'闲置':'已卖出'}</span>
                    </div>
                    <div class="asset-price">¥${Number(a.price).toLocaleString()}</div>
                    <div class="asset-meta">${buyDate} · ${days}天 ${tags} ${expireWarn}</div>
                    <div class="asset-actions">
                        ${a.status !== 'sold' ? `<button class="btn btn-sell" onclick="openSellModal('${a.id}')">卖出</button>` : ''}
                        <button class="btn btn-edit" onclick="editAsset('${a.id}')">编辑</button>
                        <button class="btn btn-delete" onclick="deleteAsset('${a.id}')">删除</button>
                    </div>
                </div>`;
            }).join('');
        }
        
        function toggleFabMenu() { document.getElementById('fab-menu').classList.toggle('active'); }
        function openAddModal() { toggleFabMenu(); document.getElementById('modal-title').textContent = '添加资产'; document.getElementById('asset-form').reset(); document.getElementById('asset-id').value = ''; document.getElementById('asset-date').value = new Date().toISOString().split('T')[0]; document.getElementById('asset-quantity').value = 1; document.getElementById('asset-dep-years').value = 5; document.getElementById('add-modal').classList.add('active'); }
        
        async function openScanModal() {
            toggleFabMenu(); document.getElementById('scan-modal').classList.add('active'); document.getElementById('scan-result').style.display = 'none'; document.getElementById('use-scan-btn').style.display = 'none';
            try { html5QrCode = new Html5Qrcode("scanner-container"); await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 200, height: 200 } }, (text) => { document.getElementById('scan-result').style.display = 'block'; document.getElementById('scan-result').textContent = text; document.getElementById('use-scan-btn').style.display = 'block'; html5QrCode.stop(); }, () => {}); } catch(e) { alert('无法启动摄像头'); }
        }
        function closeScanModal() { if (html5QrCode) html5QrCode.stop().catch(() => {}); closeModal('scan-modal'); }
        function useScanResult() { const code = document.getElementById('scan-result').textContent; closeScanModal(); openAddModal(); document.getElementById('asset-barcode').value = code; }
        
        async function openPhotoModal() {
            toggleFabMenu(); document.getElementById('photo-modal').classList.add('active'); document.getElementById('camera-preview').style.display = 'block'; document.getElementById('captured-photo').style.display = 'none'; document.getElementById('photo-analysis').style.display = 'none'; document.getElementById('use-photo-btn').style.display = 'none'; document.getElementById('retake-btn').style.display = 'none'; document.getElementById('capture-btn').style.display = 'block';
            try { cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }); document.getElementById('camera-preview').srcObject = cameraStream; } catch(e) { alert('无法启动摄像头'); }
        }
        function capturePhoto() { const video = document.getElementById('camera-preview'), canvas = document.getElementById('photo-canvas'), photo = document.getElementById('captured-photo'); canvas.width = video.videoWidth; canvas.height = video.videoHeight; canvas.getContext('2d').drawImage(video, 0, 0); photo.src = canvas.toDataURL('image/jpeg'); photo.style.display = 'block'; video.style.display = 'none'; if (cameraStream) cameraStream.getTracks().forEach(t => t.stop()); document.getElementById('capture-btn').style.display = 'none'; document.getElementById('retake-btn').style.display = 'block'; document.getElementById('photo-analysis').style.display = 'block'; document.getElementById('use-photo-btn').style.display = 'block'; }
        function retakePhoto() { document.getElementById('camera-preview').style.display = 'block'; document.getElementById('captured-photo').style.display = 'none'; document.getElementById('photo-analysis').style.display = 'none'; document.getElementById('use-photo-btn').style.display = 'none'; document.getElementById('retake-btn').style.display = 'none'; document.getElementById('capture-btn').style.display = 'block'; openPhotoModal(); }
        function closePhotoModal() { if (cameraStream) cameraStream.getTracks().forEach(t => t.stop()); closeModal('photo-modal'); }
        function usePhotoResult() { const name = document.getElementById('photo-name').value, price = document.getElementById('photo-price').value; if (!name) { alert('请输入名称'); return; } closePhotoModal(); openAddModal(); if (name) document.getElementById('asset-name').value = name; if (price) document.getElementById('asset-price').value = price; }
        
        document.getElementById('asset-form').addEventListener('submit', async (e) => {
            e.preventDefault(); const id = document.getElementById('asset-id').value, now = new Date().toISOString();
            const data = { name: document.getElementById('asset-name').value, price: parseFloat(document.getElementById('asset-price').value), date: document.getElementById('asset-date').value, category: document.getElementById('asset-category').value, status: document.getElementById('asset-status').value, expire_date: document.getElementById('asset-expire').value || null, quantity: parseInt(document.getElementById('asset-quantity').value) || 1, dep_years: parseInt(document.getElementById('asset-dep-years').value) || 5, location: document.getElementById('asset-location').value || null, barcode: document.getElementById('asset-barcode').value || null, tags: document.getElementById('asset-tags').value };
            if (id) { const idx = allAssets.findIndex(a => a.id === id); if (idx !== -1) allAssets[idx] = { ...allAssets[idx], ...data, updated_at: now }; }
            else allAssets.push({ id: Date.now().toString(), ...data, sell_price: null, sell_date: null, sell_buyer: null, created_at: now, updated_at: now });
            await saveData(); closeModal('add-modal'); renderAll();
        });
        
        function editAsset(id) { const a = allAssets.find(x => x.id === id); if (!a) return; document.getElementById('modal-title').textContent = '编辑资产'; document.getElementById('asset-id').value = a.id; document.getElementById('asset-name').value = a.name; document.getElementById('asset-price').value = a.price; document.getElementById('asset-date').value = a.date || ''; document.getElementById('asset-category').value = a.category || '其他'; document.getElementById('asset-status').value = a.status || 'active'; document.getElementById('asset-expire').value = a.expire_date || ''; document.getElementById('asset-quantity').value = a.quantity || 1; document.getElementById('asset-dep-years').value = a.dep_years || 5; document.getElementById('asset-location').value = a.location || ''; document.getElementById('asset-barcode').value = a.barcode || ''; document.getElementById('asset-tags').value = a.tags || ''; document.getElementById('add-modal').classList.add('active'); }
        async function deleteAsset(id) { if (!confirm('删除？')) return; allAssets = allAssets.filter(a => a.id !== id); await saveData(); renderAll(); }
        function openSellModal(id) { document.getElementById('sell-asset-id').value = id; document.getElementById('sell-price').value = ''; document.getElementById('sell-date').value = new Date().toISOString().split('T')[0]; document.getElementById('sell-modal').classList.add('active'); }
        document.getElementById('sell-form').addEventListener('submit', async (e) => { e.preventDefault(); const id = document.getElementById('sell-asset-id').value, idx = allAssets.findIndex(a => a.id === id); if (idx !== -1) { allAssets[idx].status = 'sold'; allAssets[idx].sell_price = parseFloat(document.getElementById('sell-price').value); allAssets[idx].sell_date = document.getElementById('sell-date').value; allAssets[idx].updated_at = new Date().toISOString(); await saveData(); } closeModal('sell-modal'); renderAll(); });
        
        function openSettingsModal() { document.getElementById('settings-token').value = githubToken; document.getElementById('settings-gist-id').value = gistId; document.getElementById('settings-modal').classList.add('active'); }
        async function saveSettings() { const t = document.getElementById('settings-token').value.trim(), g = document.getElementById('settings-gist-id').value.trim(); if (t) { githubToken = t; localStorage.setItem(TOKEN_KEY, t); } if (g) { gistId = g; localStorage.setItem(GIST_ID_KEY, g); } closeModal('settings-modal'); await loadData(); }
        function showExportModal() { document.getElementById('export-modal').classList.add('active'); }
        function exportData(type) { const today = new Date().toISOString().split('T')[0]; if (type === 'json') downloadFile(JSON.stringify(allAssets, null, 2), `资产_${today}.json`, 'application/json'); else if (type === 'csv') { const h = ['名称','分类','状态','价格','日期','数量','折旧年限','位置','标签']; const r = allAssets.map(a => [a.name,a.category,a.status,a.price,a.date,a.quantity,a.dep_years||5,a.location,a.tags].map(v => `"${v||''}"`).join(',')); downloadFile([h.join(','),...r].join('\n'), `资产_${today}.csv`, 'text/csv'); } closeModal('export-modal'); }
        function downloadFile(c, f, t) { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([c], { type: t })); a.download = f; a.click(); }
        
        document.querySelectorAll('.tab').forEach(tab => { tab.addEventListener('click', () => { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); tab.classList.add('active'); currentFilter = tab.dataset.filter; selectedIds.clear(); updateBatchBar(); renderAssets(); }); });
        
        loadData();
    </script>
</body>
</html>
